
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ficha de Inscrição</title>
</head>
<body bgcolor="#E0E0E0">

    <br><br>

    <form action="#" method="POST">
        <table align="center" border="0" cellpadding="12" cellspacing="0" width="700" bgcolor="#FFFFFF">
            
            <tr bgcolor="#EEEEEE">
                <td colspan="2" align="center">
                    <font face="Verdana, Arial" size="4">
                        <b>Ficha de Inscrição</b>
                    </font>
                </td>
            </tr>

            <tr>
                <td align="right" width="180">
                    <font face="Arial" size="2">Nome do candidato:</font>
                </td>
                <td>
                    <input type="text" name="nome" size="65">
                </td>
            </tr>

            <tr>
                <td align="right">
                    <font face="Arial" size="2">Endereço:</font>
                </td>
                <td>
                    <input type="text" name="endereco" size="65">
                </td>
            </tr>

            <tr>
                <td align="right">
                    <font face="Arial" size="2">CEP:</font>
                </td>
                <td>
                    <input type="text" name="cep" size="12">
                    &nbsp;&nbsp;
                    <font face="Arial" size="2">-- Cidade --</font>
                    <select name="cidade">
                        <option value=""></option>
                    </select>
                    &nbsp;&nbsp;
                    <font face="Arial" size="2">-- UF --</font>
                    <select name="uf">
                        <option value=""></option>
                    </select>
                </td>
            </tr>

            <tr>
                <td align="right">
                    <font face="Arial" size="2">Telefone:</font>
                </td>
                <td>
                    <input type="text" name="ddd" size="15">
                    <input type="text" name="tel_prefixo" size="15">
                    <input type="text" name="tel_sufixo" size="15">
                </td>
            </tr>

            <tr>
                <td align="right">
                    <font face="Arial" size="2">RG:</font>
                </td>
                <td>
                    <input type="text" name="rg" size="12">
                    &nbsp;
                    <font face="Arial" size="2">CPF:</font>
                    <input type="text" name="cpf" size="12">
                    &nbsp;
                    <font face="Arial" size="2">Sexo:</font>
                    <input type="radio" name="sexo" value="m"> <font face="Arial" size="1">Mas.</font>
                    <input type="radio" name="sexo" value="f"> <font face="Arial" size="1">Fem.</font>
                </td>
            </tr>

            <tr>
                <td align="right">
                    <font face="Arial" size="2">Escolaridade:</font>
                </td>
                <td>
                    <select name="escolaridade">
                        <option value="">-- Selecione --</option>
                    </select>
                    &nbsp;
                    <font face="Arial" size="2">Email:</font>
                    <input type="text" name="email" size="25">
                </td>
            </tr>

            <tr>
                <td align="right">
                    <font face="Arial" size="2">Curso:</font>
                </td>
                <td>
                    <select name="curso">
                        <option value="">-- Selecione --</option>
                    </select>
                    &nbsp;
                    <font face="Arial" size="2">Senha de acompanhamento:</font>
                    <input type="password" name="senha" size="8" value="">
                </td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <br>
                    <input type="submit" value="       CADASTRAR       ">
                    <br><br>
                </td>
            </tr>

        </table>
    </form>

</body>
</html>
